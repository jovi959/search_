- description: handles empty search results gracefully
  vars:
    input: "Find a clearly documented official source for a totally made up product xyzq-not-real"
    fixtures:
      search_google:
        - []
      navigate_and_summarize:
        - summary: null
          link: "https://example.com/timeout"
          error: "Navigation timeout: page did not load within 30 seconds"
  assert:
    - type: javascript
      metric: valid_json
      value: |
        let obj;
        try { obj = JSON.parse(output); } catch (e) { return false; }
        return !!obj.answer && Array.isArray(obj.steps);

    - type: llm-rubric
      value: |
        Pass if the agent is transparent about uncertainty, acknowledges
        it could not find relevant results, and does not fabricate facts
        or sources. It should not claim to have found information.
