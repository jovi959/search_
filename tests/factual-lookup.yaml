- description: "factual lookup — searches, reads a page, and synthesizes an answer about what Promptfoo is"
  vars:
    input: "What is Promptfoo and what is it used for?"
    fixtures:
      search_google:
        - - title: "Promptfoo: LLM Evaluation and Testing"
            link: "https://www.promptfoo.dev/"
          - title: "Promptfoo Documentation - Getting Started"
            link: "https://www.promptfoo.dev/docs/intro/"
          - title: "promptfoo/promptfoo: Test your prompts, agents, and RAGs"
            link: "https://github.com/promptfoo/promptfoo"
      get_page_content:
        - page_text: "Promptfoo - LLM Evaluation and Testing. Getting Started. Promptfoo is an open-source command-line tool and library for evaluating LLM output quality. With Promptfoo you can: Test prompts and models systematically using configurable test cases. Compare multiple prompts or providers side-by-side. Run evaluations against RAG pipelines, agents, and chains. Use assertions including JavaScript, JSON schema, and model-graded rubrics. View results in a web dashboard. Install: npm install -g promptfoo. Quick Start: promptfoo init, promptfoo eval, promptfoo view."
          url: "https://www.promptfoo.dev/docs/intro/"
          error: null
  assert:
    - type: javascript
      metric: has_answer
      value: |
        const obj = JSON.parse(output);
        return typeof obj.answer === 'string' && obj.answer.length > 20;

    - type: javascript
      metric: used_search
      value: |
        const obj = JSON.parse(output);
        return obj.steps.some(s => s.tool === 'search_google');

    - type: javascript
      metric: used_get_page
      value: |
        const obj = JSON.parse(output);
        return obj.steps.some(s => s.tool === 'get_page_content');

    - type: llm-rubric
      value: |
        The output is a JSON object with an "answer" field. Evaluate the answer:
        Pass if it clearly explains what Promptfoo is, is relevant to the question,
        and does not invent unsupported claims.
