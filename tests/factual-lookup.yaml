- description: simple factual lookup
  vars:
    input: "What is Promptfoo and what is it used for?"
    fixtures:
      search_google:
        - promptfoo-basic
      navigate_and_summarize:
        - promptfoo-intro
  assert:
    - type: javascript
      metric: valid_json
      value: |
        let obj;
        try { obj = JSON.parse(output); } catch (e) { return false; }
        return !!obj.answer && Array.isArray(obj.sources) && Array.isArray(obj.steps);

    - type: javascript
      metric: used_search
      value: |
        const obj = JSON.parse(output);
        return obj.steps.some(step => step.tool === 'search_google');

    - type: javascript
      metric: has_source_links
      value: |
        const obj = JSON.parse(output);
        return obj.sources.length > 0 &&
          obj.sources.every(s => typeof s.title === 'string' && /^https?:\/\//.test(s.link));

    - type: llm-rubric
      value: |
        Pass if the answer is clear, relevant to the user's question,
        grounded in the listed sources, and does not invent unsupported claims.
