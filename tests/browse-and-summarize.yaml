- description: should browse then summarize
  vars:
    input: "Find the official Promptfoo docs and summarize what Promptfoo does."
    fixtures:
      search_google:
        - - title: "Promptfoo Documentation - Introduction"
            link: "https://www.promptfoo.dev/docs/intro/"
          - title: "Promptfoo Configuration Reference"
            link: "https://www.promptfoo.dev/docs/configuration/reference/"
          - title: "Promptfoo Providers - Custom Scripts"
            link: "https://www.promptfoo.dev/docs/providers/custom-script/"
      get_page_content:
        - page_text: "Promptfoo Configuration Reference. promptfooconfig.yaml. description: string. prompts: list of prompt strings or file paths. providers: list of provider configs (openai:chat:gpt-4, exec:python script.py, etc). tests: list of test cases with vars and assertions. defaultTest: shared options for all tests including grading provider. Assertions: type: javascript, type: llm-rubric, type: contains, type: json-schema. Provider config: id, config.apiBaseUrl, config.apiKey. Test vars use Mustache templates: {{variable}}."
          url: "https://www.promptfoo.dev/docs/configuration/reference/"
          error: null
  assert:
    - type: javascript
      metric: has_answer
      value: |
        const obj = JSON.parse(output);
        return typeof obj.answer === 'string' && obj.answer.length > 20;

    - type: javascript
      metric: used_get_page
      value: |
        const obj = JSON.parse(output);
        return obj.steps.some(s => s.tool === 'get_page_content');

    - type: llm-rubric
      value: |
        The output is a JSON object with an "answer" field. Evaluate the answer:
        Pass if it summarizes the retrieved page content accurately
        and does not overclaim beyond what the page says.
