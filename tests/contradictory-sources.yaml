- description: "contradictory sources — two pages give conflicting caffeine amounts, agent should present the range or note the discrepancy"
  vars:
    input: "How much caffeine is in a cup of green tea?"
    fixtures:
      search_google:
        - - title: "Green Tea Caffeine Content - Healthline"
            link: "https://www.healthline.com/green-tea-caffeine"
          - title: "Caffeine in Green Tea - Medical News Today"
            link: "https://www.medicalnewstoday.com/green-tea-caffeine"
          - title: "Green Tea Facts - WebMD"
            link: "https://www.webmd.com/green-tea"
      get_page_content:
        - page_text: "Green Tea Caffeine Content. An 8-ounce cup of green tea typically contains 25 to 29 mg of caffeine. This is significantly less than coffee, which contains 95 to 200 mg per cup. The low caffeine content makes green tea a good choice for those sensitive to caffeine. Decaffeinated green tea contains about 2 mg per cup."
          url: "https://www.healthline.com/green-tea-caffeine"
          error: null
        - page_text: "How Much Caffeine Is in Green Tea? Green tea contains between 50 and 70 mg of caffeine per 8-ounce serving, depending on the brewing time and water temperature. Steeping for longer than 3 minutes or using boiling water extracts more caffeine. Some premium matcha green teas can contain up to 70 mg per serving. This makes green tea a moderate-caffeine beverage compared to coffee."
          url: "https://www.medicalnewstoday.com/green-tea-caffeine"
          error: null
  assert:
    - type: javascript
      metric: has_answer
      value: |
        const obj = JSON.parse(output);
        return typeof obj.answer === 'string' && obj.answer.length > 30;

    - type: javascript
      metric: read_multiple_pages
      value: |
        const obj = JSON.parse(output);
        const pages = obj.steps.filter(s => s.tool === 'get_page_content');
        return pages.length >= 2;

    - type: javascript
      metric: mentions_numbers
      value: |
        const obj = JSON.parse(output);
        return /\d+\s*mg/i.test(obj.answer);

    - type: llm-rubric
      value: |
        The output is a JSON object with an "answer" field. Evaluate the answer:
        Pass if it mentions a range of caffeine amounts or notes that the amount
        varies. Fail if it gives only one specific number with no variation.
