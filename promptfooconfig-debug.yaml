description: debug-retry-irrelevant

prompts:
  - file://prompts/websearch-agent.txt

providers:
  - id: "exec:.venv/Scripts/python providers/websearch_agent.py"
    config:
      tester:
        model: "{{env.AGENT_MODEL}}"
        base_url: "{{env.LM_STUDIO_BASE_URL}}"
        api_key: "{{env.LM_STUDIO_API_KEY}}"

defaultTest:
  options:
    transformVars: |
      const raw = String(process.env.INJECT_DATE_CONTEXT ?? 'true').trim().toLowerCase();
      const enabled = !['', '0', 'false', 'no', 'off', 'disabled'].includes(raw);
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const d = new Date();
      const current_date = enabled ? `${months[d.getMonth()]} ${d.getFullYear()}` : '';
      return {...vars, current_date};
    provider:
      id: "openai:chat:{{env.GRADER_MODEL}}"
      config:
        apiBaseUrl: "{{env.LM_STUDIO_BASE_URL}}"
        apiKey: "{{env.LM_STUDIO_API_KEY}}"

tests:
  - tests/date-aware-query.yaml
