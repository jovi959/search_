description: websearch-agent-eval

prompts:
  - file://prompts/websearch-agent.txt

providers:
  - id: "exec:.venv/Scripts/python providers/websearch_agent.py"
    config:
      tester:
        model: "{{env.AGENT_MODEL}}"
        base_url: "{{env.LM_STUDIO_BASE_URL}}"
        api_key: "{{env.LM_STUDIO_API_KEY}}"

defaultTest:
  options:
    transformVars: "{...vars}"
    provider:
      id: "openai:chat:{{env.GRADER_MODEL}}"
      config:
        apiBaseUrl: "{{env.LM_STUDIO_BASE_URL}}"
        apiKey: "{{env.LM_STUDIO_API_KEY}}"

tests:
  - tests/factual-lookup.yaml
  - tests/browse-and-summarize.yaml
  - tests/no-results.yaml
  - tests/jamaica-news.yaml
  - tests/retry-irrelevant.yaml
  - tests/multi-page-synthesis.yaml
  - tests/specific-fact-extraction.yaml
  - tests/page-error-fallback.yaml
  - tests/all-pages-fail.yaml
  - tests/contradictory-sources.yaml
  - tests/single-search-result.yaml
  - tests/noisy-page-content.yaml
  - tests/ssl-error-fallback.yaml
  - tests/page-injection.yaml
  - tests/page-injection-tool-abuse.yaml
